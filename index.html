<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>KKAW BPI — Slip Potongan + Simulasi</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f2f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-wrap{width:100%;max-width:360px;}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.login-logo{text-align:center;margin-bottom:16px;}
.login-logo img{width:80px;height:80px;object-fit:contain;}
.login-title{text-align:center;font-size:17px;font-weight:800;color:#1a237e;}
.login-sub{text-align:center;font-size:11px;color:#888;margin-top:4px;margin-bottom:28px;line-height:1.6;}
.form-label{display:block;font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.form-group{margin-bottom:14px;}
.form-input{width:100%;background:#f5f7ff;border:1.5px solid #e0e4f5;border-radius:10px;padding:11px 14px;color:#1a237e;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#4f6ef7;background:#fff;}
.form-input::placeholder{color:#bbb;}
.btn-login{width:100%;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .2s;margin-top:4px;letter-spacing:.03em;}
.btn-login:hover{opacity:.9;}
.err-box{background:#fff5f5;border:1px solid #ffcdd2;color:#c62828;border-radius:8px;padding:9px 13px;font-size:12px;margin-top:12px;display:none;text-align:center;}
.err-box.show{display:block;}
.slip-wrap{width:100%;max-width:540px;display:none;}
.slip-topbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.slip-topbar-info strong{font-size:14px;font-weight:800;color:#1a237e;display:block;}
.slip-topbar-info span{font-size:11px;color:#888;}
.topbar-btns{display:flex;flex-wrap:wrap;gap:8px;}
.btn-print,.btn-simulasi,.btn-download,.btn-out{border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.btn-print{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;}
.btn-simulasi{background:#ff8f00;color:#fff;display:flex;align-items:center;gap:6px;}
.btn-download{background:#2e7d32;color:#fff;}
.btn-out{background:#fff;color:#666;border:1.5px solid #ddd;}
.slip-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
.slip-head{background:#0d1b4b;padding:14px 20px;text-align:center;}
.slip-head-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:.12em;text-transform:uppercase;}
.slip-head-date{font-size:12px;color:#90caf9;margin-top:4px;font-weight:600;}
.slip-id{display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:14px 20px;background:#f0f4ff;border-bottom:2px solid #0d1b4b;}
.slip-id img{width:60px;height:60px;object-fit:contain;flex-shrink:0;}
.id-table{flex:1;min-width:150px;}
.id-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:8px;}
.id-lbl{font-size:11.5px;color:#666;font-weight:500;}
.id-val{font-weight:700;color:#0d1b4b;text-align:right;font-size:12px;word-break:break-word;}
.id-val.noreg{color:#c0392b;font-size:14px;font-weight:800;}
.id-val.nama{font-size:12.5px;}
.req-section{background:#e8edf8;border-bottom:1px solid #c5cae9;}
.req-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;border-bottom:1px solid #d5daf0;}
.req-row:last-child{border-bottom:none;}
.req-lbl{font-size:12px;font-weight:700;color:#1a237e;font-style:italic;}
.req-val{font-size:13px;font-weight:800;color:#1a237e;}
.sec-hd{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;background:#dde3f5;border-top:1px solid #c5cae9;}
.sec-lbl{font-size:11px;font-weight:800;color:#1a237e;text-transform:uppercase;letter-spacing:.05em;}
.sec-val{font-size:13px;font-weight:800;color:#1a237e;}
.d-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:5px 20px 5px 34px;border-bottom:1px solid #f5f5f5;}
.d-lbl{font-size:11.5px;color:#555;}
.d-right{display:flex;align-items:center;gap:4px;}
.d-rp{font-size:11px;color:#aaa;}
.d-val{font-size:12px;font-weight:600;color:#222;min-width:90px;text-align:right;}
.tenor-row{display:flex;flex-wrap:wrap;border-bottom:1px solid #f0f0f0;background:#fafafa;}
.t-cell{flex:1;text-align:center;padding:7px 4px;border-right:1px solid #f0f0f0;}
.t-cell:last-child{border-right:none;}
.t-lbl{font-size:10px;color:#999;font-weight:600;}
.t-num{font-size:15px;font-weight:800;color:#222;display:block;margin-top:2px;}
.t-num.red{color:#c0392b;}
.pel-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;background:#fff8e1;border-top:1px solid #ffe082;border-bottom:1px solid #ffe082;}
.pel-lbl{font-size:11.5px;font-weight:700;color:#e65100;}
.pel-val{font-size:13px;font-weight:800;color:#e65100;}
.totsim-hd{padding:7px 20px;background:#e8f5e9;border-top:2px solid #1a237e;}
.totsim-hd-lbl{font-size:10px;font-weight:800;color:#1b5e20;text-transform:uppercase;letter-spacing:.06em;}
.ts-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:5px 20px 5px 34px;border-bottom:1px solid #f0f0f0;}
.ts-lbl{font-size:11.5px;color:#555;}
.ts-right{display:flex;align-items:center;gap:4px;}
.ts-rp{font-size:11px;color:#aaa;}
.ts-val{font-size:12px;font-weight:600;color:#222;min-width:100px;text-align:right;}
.grand{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:13px 20px;background:#0d1b4b;}
.grand-lbl{font-size:13px;font-weight:800;color:#90caf9;text-transform:uppercase;letter-spacing:.05em;}
.grand-right{display:flex;align-items:center;gap:6px;}
.grand-rp{font-size:12px;color:#5c7bbf;font-weight:600;}
.grand-val{font-size:18px;font-weight:800;color:#fff;}
.slip-foot{padding:9px 20px;text-align:center;background:#f8f9ff;}
.slip-foot-txt{font-size:10px;color:#bbb;}
.simulasi-panel{margin-top:20px;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:none;}
.simulasi-panel.show{display:block;}
.simulasi-header{background:#ff8f00;padding:12px 20px;color:white;font-weight:800;font-size:14px;display:flex;align-items:center;gap:10px;}
.simulasi-body{padding:20px;}
.form-simulasi{display:flex;flex-direction:column;gap:14px;}
.row-sim{display:flex;flex-direction:column;gap:4px;}
.row-sim label{font-size:12px;font-weight:700;color:#333;}
.row-sim input,.row-sim select{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.check-group{display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.check-group label{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:normal;cursor:pointer;}
.pel-info{color:#c62828;font-weight:600;font-size:13px;}
.btn-hitung{background:#1a237e;color:white;border:none;padding:12px;border-radius:8px;font-weight:800;cursor:pointer;margin-top:10px;font-size:14px;width:100%;font-family:inherit;}
.hasil-simulasi{margin-top:20px;background:#f5f7ff;padding:16px;border-radius:12px;border-left:5px solid #ff8f00;}
.hasil-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid #e0e4f5;font-size:13px;}
.hasil-lbl{font-weight:600;color:#444;}
.hasil-val{font-weight:800;color:#1a237e;}
.hasil-val.besar{font-size:16px;}
.bg-kuning{background-color:#FFF8E1;border-radius:8px;padding:6px 12px;margin:4px 0;}
.txt-merah{color:#c62828!important;}
.txt-hijau{color:#2e7d32!important;}
#loading{position:fixed;inset:0;background:rgba(240,242,248,0.85);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
#loading.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid #dde3f5;border-top-color:#1a237e;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sim-loading{display:none;text-align:center;padding:16px;color:#666;font-size:13px;}
.sim-loading.show{display:block;}
.sim-spinner{display:inline-block;width:20px;height:20px;border:2px solid #dde3f5;border-top-color:#ff8f00;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
@media print{body{background:#fff!important;padding:0;}.slip-topbar{display:none!important;}.slip-wrap{display:block!important;max-width:100%;}.slip-card{border-radius:0;box-shadow:none;}.login-wrap{display:none!important;}.simulasi-panel{display:none!important;}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Memverifikasi...</div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo"><img src="https://i.ibb.co/Fqch07FC/logo-kkaw-bpi-png.png" alt="KKAW BPI" width="80" height="80"></div>
    <div class="login-title">KKAW BPI</div>
    <div class="login-sub">Koperasi Konsumen Amanah Warga<br>Yayasan BPI Bandung</div>
    <div class="form-group">
      <label class="form-label">No. Registrasi</label>
      <input class="form-input" id="inp-noreg" type="number" placeholder="Contoh: 24002" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="inp-pass" type="password" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">MASUK</button>
    <div class="err-box" id="err-box"></div>
  </div>
</div>

<!-- SLIP WRAP -->
<div class="slip-wrap" id="slip-wrap">
  <div class="slip-topbar">
    <div class="slip-topbar-info">
      <strong>Slip Potongan Koperasi</strong>
      <span id="topbar-sub">—</span>
    </div>
    <div class="topbar-btns">
      <button class="btn-simulasi" id="btn-toggle-simulasi">🧮 Simulasi Pinjaman</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
      <button class="btn-download" id="btn-download" onclick="downloadSlipJPG()">📸 Download JPG</button>
      <button class="btn-out" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="slip-card">
    <div class="slip-head">
      <div class="slip-head-title">Slip Potongan — K K A W &nbsp; B P I</div>
      <div class="slip-head-date" id="slip-date">—</div>
    </div>
    <div class="slip-id">
      <img src="https://i.ibb.co/Fqch07FC/logo-kkaw-bpi-png.png" alt="KKAW BPI" width="60" height="60">
      <div class="id-table">
        <div class="id-row"><span class="id-lbl">No. Registrasi</span><span class="id-val noreg" id="s-noreg">—</span></div>
        <div class="id-row"><span class="id-lbl">Unit</span><span class="id-val" id="s-unit">—</span></div>
        <div class="id-row"><span class="id-lbl">Nama Anggota</span><span class="id-val nama" id="s-nama">—</span></div>
      </div>
    </div>
    <div id="slip-body"></div>
  </div>

  <!-- PANEL SIMULASI -->
  <div class="simulasi-panel" id="simulasi-panel">
    <div class="simulasi-header"><span>🧮</span> Simulasi Pinjaman KKAW BPI</div>
    <div class="simulasi-body">
      <div class="form-simulasi">
        <div class="row-sim">
          <label>Jenis Pinjaman:</label>
          <div class="radio-group">
            <label><input type="radio" name="jenis" value="uang" checked> Uang (Jasa 0.5%/bln)</label>
            <label><input type="radio" name="jenis" value="perdagum"> Perdagum (Jasa 1%/bln)</label>
          </div>
        </div>
        <div class="row-sim">
          <label>Tahun Lahir (contoh: 1990):</label>
          <input type="number" id="tahun-lahir" placeholder="1990">
        </div>
        <div class="row-sim">
          <label>Pengajuan Pinjaman (Rp):</label>
          <input type="number" id="pengajuan" placeholder="15000000" value="15000000">
        </div>
        <div class="row-sim">
          <label>Tenor (bulan):</label>
          <input type="number" id="tenor" placeholder="24" value="24">
        </div>
        <div class="row-sim">
          <label>Gunakan Pelunasan:</label>
          <div class="check-group">
            <label><span>Pelunasan SP &nbsp;<span class="pel-info">(Rp <span id="label-pelunasan-sp">0</span>)</span></span><input type="checkbox" id="cb-pelunasan-sp"></label>
            <label><span>Pelunasan PU &nbsp;<span class="pel-info">(Rp <span id="label-pelunasan-pu">0</span>)</span></span><input type="checkbox" id="cb-pelunasan-pu"></label>
          </div>
        </div>
        <button class="btn-hitung" id="btn-hitung-simulasi">Hitung Simulasi</button>
      </div>
      <div class="sim-loading" id="sim-loading"><span class="sim-spinner"></span> Mengambil tarif premi dari server...</div>
      <div class="hasil-simulasi" id="hasil-simulasi" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// ======================= KONFIGURASI =======================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWuVN9ysSUpJ7Z3BB23kVky8Y7SedRje27va2OmKb-3iMxI7e-7BNvIV5ATkoqBCV5nw/exec";
let currentMember = null;
let periodeSlip = "";

// ======================= LOCKOUT =======================
const STORAGE_KEY = 'kkaow_login_attempts';
const LOCKOUT_KEY = 'kkaow_login_lockout';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MINUTES = 10;

function getLoginAttempts(){ return parseInt(localStorage.getItem(STORAGE_KEY)||'0'); }
function setLoginAttempts(c){ localStorage.setItem(STORAGE_KEY, c); }
function getLockoutUntil(){ return parseInt(localStorage.getItem(LOCKOUT_KEY)||'0'); }
function setLockoutUntil(t){ localStorage.setItem(LOCKOUT_KEY, t); }
function clearLockout(){ localStorage.removeItem(LOCKOUT_KEY); }

function isLockedOut(){
  const until = getLockoutUntil();
  if(!until) return false;
  if(Date.now() >= until){ clearLockout(); return false; }
  return true;
}

function updateLockoutUI(){
  const btn = document.getElementById('btn-login');
  if(isLockedOut()){
    btn.disabled = true;
    document.getElementById('err-box').textContent = "Terlalu banyak percobaan. Coba lagi nanti.";
    document.getElementById('err-box').classList.add('show');
  }
}

// ======================= HELPER =======================
const rp = n => (!n||isNaN(n)||n==0)?'-':Number(n).toLocaleString('id-ID');
const parseN = v => { if(!v||v===''||v==='-') return 0; const s=String(v).replace(/[Rp\s.]/g,'').replace(',','.'); return parseFloat(s)||0; };

function setLoading(on){ document.getElementById('loading').style.display = on ? 'flex' : 'none'; }

function getPeriodeSlip(){
  const today=new Date(), tgl=today.getDate(), bln=today.getMonth(), thn=today.getFullYear();
  const nm=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  let pb=bln, pt=thn;
  if(tgl>=26){ if(bln===11){pb=0;pt=thn+1;} else {pb=bln+1;} }
  return `01 ${nm[pb]} ${pt}`;
}

// ======================= LOGIN (TANPA SUPER PASSWORD) =======================
async function doLogin(){
  const err = document.getElementById('err-box');
  err.classList.remove('show');
  if(isLockedOut()) { updateLockoutUI(); return; }

  const noreg = document.getElementById('inp-noreg').value.trim();
  const pass  = document.getElementById('inp-pass').value.trim();
  const btn   = document.getElementById('btn-login');

  if(!noreg || !pass){
    err.textContent = 'No. Registrasi dan Password wajib diisi.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  setLoading(true);

  try{
    const res = await fetch(SCRIPT_URL + '?action=login&noreg=' + encodeURIComponent(noreg) + '&pass=' + encodeURIComponent(pass));
    const data = await res.json();

    if(data.status === 'ok' && data.member){
      currentMember = data.member;
      renderSlip(currentMember);
    } else {
      err.textContent = data.message || 'No. Registrasi atau Password salah.';
      err.classList.add('show');
    }
  } catch(e){
    err.textContent = 'Gagal terhubung ke server. Cek koneksi internet Anda.';
    err.classList.add('show');
  }

  btn.disabled = false;
  setLoading(false);
}

// ======================= RENDER SLIP =======================
function renderSlip(m){
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('slip-wrap').style.display = 'block';

  document.getElementById('s-noreg').textContent = m.no_reg || '-';
  document.getElementById('s-unit').textContent = m.unit || '-';
  document.getElementById('s-nama').textContent = m.nama || '-';
  document.getElementById('slip-date').textContent = periodeSlip;
  document.getElementById('topbar-sub').textContent = 'Periode ' + periodeSlip;

  // Isi data pelunasan untuk simulasi
  const pelSP = parseN(m.pelunasan_uang);
  const pelPU = parseN(m.pelunasan_bar);
  document.getElementById('label-pelunasan-sp').innerText = rp(pelSP);
  document.getElementById('label-pelunasan-pu').innerText = rp(pelPU);
  document.getElementById('cb-pelunasan-sp').setAttribute('data-nilai', pelSP);
  document.getElementById('cb-pelunasan-pu').setAttribute('data-nilai', pelPU);

  // Render detail slip (ringkas)
  let html = `<div class="req-section"><div class="req-row"><span class="req-lbl">Permintaan Potongan KKAW</span><span class="req-val">Rp ${rp(parseN(m.jlh_potongan))}</span></div></div>`;
  document.getElementById('slip-body').innerHTML = html;
}

// ======================= FUNGSI LAIN =======================
function toggleSimulasiPanel(){
  document.getElementById('simulasi-panel').classList.toggle('show');
}

async function downloadSlipJPG(){
  const btn = document.getElementById('btn-download');
  const orig = btn.textContent;
  btn.textContent = 'Memproses...';
  btn.disabled = true;
  const card = document.querySelector('.slip-card');
  try{
    const canvas = await html2canvas(card, {scale:2, backgroundColor:'#ffffff', useCORS:true});
    const link = document.createElement('a');
    link.download = 'slip_kkaw_bpi.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  } catch(e){ alert('Gagal download'); }
  btn.textContent = orig;
  btn.disabled = false;
}

function doLogout(){
  document.getElementById('slip-wrap').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'block';
  document.getElementById('inp-noreg').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('err-box').classList.remove('show');
}

// ======================= INIT =======================
periodeSlip = getPeriodeSlip();
document.getElementById('btn-toggle-simulasi').addEventListener('click', toggleSimulasiPanel);
document.getElementById('btn-download').addEventListener('click', downloadSlipJPG);
updateLockoutUI();
</script>
</body>
</html>
