<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKAW BPI — Slip Potongan + Simulasi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f2f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-wrap{width:100%;max-width:360px;}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.login-logo{text-align:center;margin-bottom:16px;}
.login-logo img{width:80px;height:80px;object-fit:contain;}
.login-title{text-align:center;font-size:17px;font-weight:800;color:#1a237e;}
.login-sub{text-align:center;font-size:11px;color:#888;margin-top:4px;margin-bottom:28px;line-height:1.6;}
.form-label{display:block;font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.form-group{margin-bottom:14px;}
.form-input{width:100%;background:#f5f7ff;border:1.5px solid #e0e4f5;border-radius:10px;padding:11px 14px;color:#1a237e;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#4f6ef7;background:#fff;}
.form-input::placeholder{color:#bbb;}
.form-input:disabled{background:#f0f0f0;color:#999;cursor:not-allowed;}
.btn-login{width:100%;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .2s;margin-top:4px;letter-spacing:.03em;}
.btn-login:hover{opacity:.9;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.err-box{background:#fff5f5;border:1px solid #ffcdd2;color:#c62828;border-radius:8px;padding:9px 13px;font-size:12px;margin-top:12px;display:none;text-align:center;}
.err-box.show{display:block;}
.slip-wrap{width:100%;max-width:540px;display:none;}
.slip-topbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.slip-topbar-info strong{font-size:14px;font-weight:800;color:#1a237e;display:block;}
.slip-topbar-info span{font-size:11px;color:#888;}
.topbar-btns{display:flex;flex-wrap:wrap;gap:8px;}
.btn-print,.btn-simulasi,.btn-download,.btn-out{border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.btn-print{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;}
.btn-simulasi{background:#ff8f00;color:#fff;display:flex;align-items:center;gap:6px;}
.btn-download{background:#2e7d32;color:#fff;}
.btn-out{background:#fff;color:#666;border:1.5px solid #ddd;}
.btn-print:hover,.btn-simulasi:hover,.btn-download:hover{opacity:.9;}
.btn-out:hover{background:#f5f5f5;}
.slip-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
.slip-head{background:#0d1b4b;padding:14px 20px;text-align:center;}
.slip-head-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:.12em;text-transform:uppercase;}
.slip-head-date{font-size:12px;color:#90caf9;margin-top:4px;font-weight:600;}
.slip-id{display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:14px 20px;background:#f0f4ff;border-bottom:2px solid #0d1b4b;}
.slip-id img{width:60px;height:60px;object-fit:contain;flex-shrink:0;}
.id-table{flex:1;min-width:150px;}
.id-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:8px;}
.id-lbl{font-size:11.5px;color:#666;font-weight:500;}
.id-val{font-weight:700;color:#0d1b4b;text-align:right;font-size:12px;word-break:break-word;}
.id-val.noreg{color:#c0392b;font-size:14px;font-weight:800;}
.id-val.nama{font-size:12.5px;}
.req-section{background:#e8edf8;border-bottom:1px solid #c5cae9;}
.req-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;border-bottom:1px solid #d5daf0;}
.req-row:last-child{border-bottom:none;}
.req-lbl{font-size:12px;font-weight:700;color:#1a237e;font-style:italic;}
.req-val{font-size:13px;font-weight:800;color:#1a237e;}
.sec-hd{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;background:#dde3f5;border-top:1px solid #c5cae9;}
.sec-lbl{font-size:11px;font-weight:800;color:#1a237e;text-transform:uppercase;letter-spacing:.05em;}
.sec-val{font-size:13px;font-weight:800;color:#1a237e;}
.sec-val.zero{color:#aaa;font-weight:500;}
.d-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:5px 20px 5px 34px;border-bottom:1px solid #f5f5f5;}
.d-lbl{font-size:11.5px;color:#555;}
.d-right{display:flex;align-items:center;gap:4px;}
.d-rp{font-size:11px;color:#aaa;}
.d-val{font-size:12px;font-weight:600;color:#222;min-width:90px;text-align:right;}
.d-val.zero{color:#ccc;font-weight:400;}
.tenor-row{display:flex;flex-wrap:wrap;border-bottom:1px solid #f0f0f0;background:#fafafa;}
.t-cell{flex:1;text-align:center;padding:7px 4px;border-right:1px solid #f0f0f0;}
.t-cell:last-child{border-right:none;}
.t-lbl{font-size:10px;color:#999;font-weight:600;}
.t-num{font-size:15px;font-weight:800;color:#222;display:block;margin-top:2px;}
.t-num.red{color:#c0392b;}
.pel-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:7px 20px;background:#fff8e1;border-top:1px solid #ffe082;border-bottom:1px solid #ffe082;}
.pel-lbl{font-size:11.5px;font-weight:700;color:#e65100;}
.pel-val{font-size:13px;font-weight:800;color:#e65100;}
.totsim-hd{padding:7px 20px;background:#e8f5e9;border-top:2px solid #1a237e;}
.totsim-hd-lbl{font-size:10px;font-weight:800;color:#1b5e20;text-transform:uppercase;letter-spacing:.06em;}
.ts-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:5px 20px 5px 34px;border-bottom:1px solid #f0f0f0;}
.ts-lbl{font-size:11.5px;color:#555;}
.ts-right{display:flex;align-items:center;gap:4px;}
.ts-rp{font-size:11px;color:#aaa;}
.ts-val{font-size:12px;font-weight:600;color:#222;min-width:100px;text-align:right;}
.ts-val.zero{color:#ccc;font-weight:400;}
.grand{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:13px 20px;background:#0d1b4b;}
.grand-lbl{font-size:13px;font-weight:800;color:#90caf9;text-transform:uppercase;letter-spacing:.05em;}
.grand-right{display:flex;align-items:center;gap:6px;}
.grand-rp{font-size:12px;color:#5c7bbf;font-weight:600;}
.grand-val{font-size:18px;font-weight:800;color:#fff;}
.slip-foot{padding:9px 20px;text-align:center;background:#f8f9ff;}
.slip-foot-txt{font-size:10px;color:#bbb;}
.simulasi-panel{margin-top:20px;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:none;}
.simulasi-panel.show{display:block;}
.simulasi-header{background:#ff8f00;padding:12px 20px;color:white;font-weight:800;font-size:14px;display:flex;align-items:center;gap:10px;}
.simulasi-header span{font-size:20px;}
.simulasi-body{padding:20px;}
.form-simulasi{display:flex;flex-direction:column;gap:14px;}
.row-sim{display:flex;flex-direction:column;gap:4px;}
.row-sim label{font-size:12px;font-weight:700;color:#333;}
.row-sim input,.row-sim select{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.check-group{display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.check-group label{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:normal;cursor:pointer;}
.pel-info{color:#c62828;font-weight:600;font-size:13px;}
.btn-hitung{background:#1a237e;color:white;border:none;padding:12px;border-radius:8px;font-weight:800;cursor:pointer;margin-top:10px;font-size:14px;width:100%;font-family:inherit;}
.btn-hitung:disabled{opacity:0.6;cursor:not-allowed;}
.hasil-simulasi{margin-top:20px;background:#f5f7ff;padding:16px;border-radius:12px;border-left:5px solid #ff8f00;}
.hasil-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid #e0e4f5;font-size:13px;}
.hasil-row:last-child{border-bottom:none;}
.hasil-lbl{font-weight:600;color:#444;}
.hasil-val{font-weight:800;color:#1a237e;}
.hasil-val.besar{font-size:16px;}
.bg-kuning{background-color:#FFF8E1;border-radius:8px;padding:6px 12px;margin:4px 0;}
.txt-merah{color:#c62828!important;}
.txt-hijau{color:#2e7d32!important;}
.highlight-biru{background-color:#e3f2fd;border-left:4px solid #1a237e;padding:8px 12px;border-radius:8px;margin-top:8px;}
/* Loading overlay */
#loading{position:fixed;inset:0;background:rgba(240,242,248,0.85);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
#loading.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid #dde3f5;border-top-color:#1a237e;border-radius:50%;animation:spin 1s linear infinite;}
.loading-txt{font-size:12px;color:#666;font-weight:600;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Loading simulasi (inline, bukan overlay) */
.sim-loading{display:none;text-align:center;padding:16px;color:#666;font-size:13px;}
.sim-loading.show{display:block;}
.sim-spinner{display:inline-block;width:20px;height:20px;border:2px solid #dde3f5;border-top-color:#ff8f00;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
@media print{body{background:#fff!important;padding:0;}.slip-topbar{display:none!important;}.slip-wrap{display:block!important;max-width:100%;}.slip-card{border-radius:0;box-shadow:none;}.login-wrap{display:none!important;}.simulasi-panel{display:none!important;}}
@media(max-width:600px){
  body{padding:8px;}
  .slip-wrap{max-width:100%;}
  .login-wrap{max-width:100%;}

  /* topbar */
  .slip-topbar{flex-direction:column;align-items:flex-start;}
  .topbar-btns{width:100%;justify-content:flex-start;flex-wrap:wrap;}
  .btn-print,.btn-simulasi,.btn-download,.btn-out{padding:6px 10px;font-size:11px;}

  /* identity */
  .slip-id{flex-direction:row;flex-wrap:wrap;padding:10px 12px;gap:10px;}
  .slip-id img{width:44px;height:44px;}
  .id-table{min-width:0;flex:1;}
  .id-row{gap:4px;}
  .id-lbl{font-size:10.5px;}
  .id-val{font-size:11px;}
  .id-val.noreg{font-size:12px;}

  /* slip head */
  .slip-head-title{font-size:12px;letter-spacing:.06em;}
  .slip-head-date{font-size:11px;}

  /* section header */
  .sec-hd{padding:6px 12px;flex-wrap:wrap;gap:4px;}
  .sec-lbl{font-size:10px;}
  .sec-val{font-size:12px;}

  /* detail rows */
  .d-row{padding:4px 12px 4px 20px;}
  .d-lbl{font-size:10.5px;}
  .d-val{font-size:11px;min-width:70px;}
  .d-rp{font-size:10px;}

  /* tenor */
  .t-lbl{font-size:9px;}
  .t-num{font-size:13px;}

  /* permintaan */
  .req-row{padding:6px 12px;}
  .req-lbl{font-size:11px;}
  .req-val{font-size:12px;}

  /* pelunasan */
  .pel-row{padding:6px 12px;}
  .pel-lbl{font-size:10.5px;}
  .pel-val{font-size:12px;}

  /* total simpanan */
  .totsim-hd{padding:6px 12px;}
  .ts-row{padding:4px 12px 4px 20px;}
  .ts-lbl{font-size:10.5px;}
  .ts-val{font-size:11px;min-width:70px;}
  .ts-rp{font-size:10px;}

  /* grand total */
  .grand{padding:10px 12px;}
  .grand-lbl{font-size:11px;}
  .grand-val{font-size:15px;}
  .grand-rp{font-size:11px;}

  /* footer */
  .slip-foot{padding:6px 12px;}
  .slip-foot-txt{font-size:9px;}

  /* simulasi */
  .simulasi-body{padding:14px;}
  .hasil-row{flex-direction:column;align-items:flex-start;gap:2px;}
  .hasil-val.besar{font-size:14px;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Memverifikasi...</div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo"><img src="https://i.ibb.co/Fqch07FC/logo-kkaw-bpi-png.png" alt="KKAW BPI" width="80" height="80"></div>
    <div class="login-title">KKAW BPI</div>
    <div class="login-sub">Koperasi Konsumen Amanah Warga<br>Yayasan BPI Bandung</div>
    <div class="form-group">
      <label class="form-label">No. Registrasi</label>
      <input class="form-input" id="inp-noreg" type="number" placeholder="Contoh: 24002" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="inp-pass" type="password" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">MASUK</button>
    <div class="err-box" id="err-box"></div>
  </div>
</div>

<!-- SLIP WRAP -->
<div class="slip-wrap" id="slip-wrap">
  <div class="slip-topbar">
    <div class="slip-topbar-info">
      <strong>Slip Potongan Koperasi</strong>
      <span id="topbar-sub">—</span>
    </div>
    <div class="topbar-btns">
      <button class="btn-simulasi" id="btn-toggle-simulasi">🧮 Simulasi Pinjaman</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
      <button class="btn-download" id="btn-download" onclick="downloadSlipJPG()">📸 Download JPG</button>
      <button class="btn-out" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="slip-card">
    <div class="slip-head">
      <div class="slip-head-title">Slip Potongan — K K A W &nbsp; B P I</div>
      <div class="slip-head-date" id="slip-date">—</div>
    </div>
    <div class="slip-id">
      <img src="https://i.ibb.co/Fqch07FC/logo-kkaw-bpi-png.png" alt="KKAW BPI" width="60" height="60">
      <div class="id-table">
        <div class="id-row"><span class="id-lbl">No. Registrasi</span><span class="id-val noreg" id="s-noreg">—</span></div>
        <div class="id-row"><span class="id-lbl">Unit</span><span class="id-val" id="s-unit">—</span></div>
        <div class="id-row"><span class="id-lbl">Nama Anggota</span><span class="id-val nama" id="s-nama">—</span></div>
      </div>
    </div>
    <div id="slip-body"></div>
  </div>

  <!-- PANEL SIMULASI -->
  <div class="simulasi-panel" id="simulasi-panel">
    <div class="simulasi-header"><span>🧮</span> Simulasi Pinjaman KKAW BPI</div>
    <div class="simulasi-body">
      <div class="form-simulasi">
        <div class="row-sim">
          <label>Jenis Pinjaman:</label>
          <div class="radio-group">
            <label><input type="radio" name="jenis" value="uang" checked> Uang (Jasa 0.5%/bln)</label>
            <label><input type="radio" name="jenis" value="perdagum"> Perdagum (Jasa 1%/bln)</label>
          </div>
        </div>
        <div class="row-sim">
          <label>Tahun Lahir (contoh: 1990):</label>
          <input type="number" id="tahun-lahir" placeholder="1990">
        </div>
        <div class="row-sim">
          <label>Pengajuan Pinjaman (Rp):</label>
          <input type="number" id="pengajuan" placeholder="15000000" value="15000000">
        </div>
        <div class="row-sim">
          <label>Tenor (bulan):</label>
          <input type="number" id="tenor" placeholder="24" value="24">
        </div>
        <div class="row-sim">
          <label>Gunakan Pelunasan:</label>
          <div class="check-group">
            <label>
              <span>Pelunasan SP &nbsp;<span class="pel-info">(Rp <span id="label-pelunasan-sp">0</span>)</span></span>
              <input type="checkbox" id="cb-pelunasan-sp">
            </label>
            <label>
              <span>Pelunasan PU &nbsp;<span class="pel-info">(Rp <span id="label-pelunasan-pu">0</span>)</span></span>
              <input type="checkbox" id="cb-pelunasan-pu">
            </label>
          </div>
        </div>
        <button class="btn-hitung" id="btn-hitung-simulasi">Hitung Simulasi</button>
      </div>
      <!-- Loading simulasi inline -->
      <div class="sim-loading" id="sim-loading">
        <span class="sim-spinner"></span> Mengambil tarif premi dari server...
      </div>
      <div class="hasil-simulasi" id="hasil-simulasi" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// ======================= KONFIGURASI =======================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWuVN9ysSUpJ7Z3BB23kVky8Y7SedRje27va2OmKb-3iMxI7e-7BNvIV5ATkoqBCV5nw/exec";

let currentMember = null;

// ======================= LOCKOUT =======================
const STORAGE_KEY    = 'kkaow_login_attempts';
const LOCKOUT_KEY    = 'kkaow_login_lockout';
const MAX_ATTEMPTS   = 5;
const LOCKOUT_MINUTES = 10;

function getLoginAttempts(){ return parseInt(localStorage.getItem(STORAGE_KEY)||'0'); }
function setLoginAttempts(c){ localStorage.setItem(STORAGE_KEY, c); }
function getLockoutUntil(){ return parseInt(localStorage.getItem(LOCKOUT_KEY)||'0'); }
function setLockoutUntil(t){ localStorage.setItem(LOCKOUT_KEY, t); }
function clearLockout(){ localStorage.removeItem(LOCKOUT_KEY); }
function isLockedOut(){
  const until = getLockoutUntil();
  if(!until) return false;
  if(Date.now() >= until){ setLoginAttempts(0); clearLockout(); return false; }
  return true;
}
function getRemainingLockoutSeconds(){
  const r = Math.ceil((getLockoutUntil()-Date.now())/1000);
  return r>0?r:0;
}
function formatLockoutTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return m>0?`${m} menit ${sec} detik`:`${sec} detik`;
}
function updateLockoutUI(){
  const btn=document.getElementById('btn-login');
  const nrg=document.getElementById('inp-noreg');
  const pas=document.getElementById('inp-pass');
  if(isLockedOut()){
    btn.disabled=nrg.disabled=pas.disabled=true;
    const e=document.getElementById('err-box');
    e.textContent=`⚠️ Terlalu banyak percobaan gagal. Coba lagi setelah ${formatLockoutTime(getRemainingLockoutSeconds())}.`;
    e.classList.add('show');
  } else {
    btn.disabled=nrg.disabled=pas.disabled=false;
  }
}
function resetLoginAttempts(){ setLoginAttempts(0); clearLockout(); }
function recordFailedAttempt(){
  const n=getLoginAttempts()+1;
  setLoginAttempts(n);
  if(n>=MAX_ATTEMPTS) setLockoutUntil(Date.now()+(LOCKOUT_MINUTES*60*1000));
  return n;
}

// ======================= PERIODE SLIP =======================
function getPeriodeSlip(){
  const today=new Date(), tgl=today.getDate(), bln=today.getMonth(), thn=today.getFullYear();
  const nm=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  let pb, pt;
  if(tgl>=26){ if(bln===11){pb=0;pt=thn+1;}else{pb=bln+1;pt=thn;} }
  else{ pb=bln; pt=thn; }
  return `01 ${nm[pb]} ${pt}`;
}
const periodeSlip = getPeriodeSlip();
document.getElementById('slip-date').textContent  = periodeSlip;
document.getElementById('topbar-sub').textContent = 'Periode '+periodeSlip;

// ======================= HELPERS =======================
const rp   = n => (!n||isNaN(n)||n==0)?'-':Number(n).toLocaleString('id-ID');
const parseN = v => { if(!v||v===''||v==='-') return 0; const s=String(v).replace(/[Rp\s]/g,'').replace(/\./g,'').replace(',','.'); return parseFloat(s)||0; };
function setLoading(on){ document.getElementById('loading').style.display=on?'flex':'none'; }

// ======================= LOGIN =======================
async function doLogin(){
  const err=document.getElementById('err-box');
  err.classList.remove('show');
  if(isLockedOut()){ updateLockoutUI(); return; }
  const noreg=document.getElementById('inp-noreg').value.trim();
  const pass =document.getElementById('inp-pass').value.trim();
  const btn  =document.getElementById('btn-login');
  if(!noreg||!pass){ err.textContent='No. Registrasi dan Password wajib diisi.'; err.classList.add('show'); return; }

  // SUPER PASSWORD — langsung ambil data anggota asli dari server
  if(pass==="Putra21"){
    resetLoginAttempts();
    btn.disabled=true; setLoading(true);
    try{
      const res  = await fetch(SCRIPT_URL+'?action=getSuperMember&noreg='+encodeURIComponent(noreg));
      const data = await res.json();
      if(data.status==='ok' && data.member){
        currentMember = data.member;
      } else {
        currentMember={
          no_reg:noreg, nama:'(Data tidak ditemukan — No.Reg '+noreg+')', unit:'—',
          sim_pokok:0,sim_wajib:0,sim_sukarela:0,sim_thr:0,sim_qurban:0,sim_dansos:0,sim_harkop:0,
          jlh_simpanan:0,pokok_uang:0,jasa_uang:0,tenor_uang:0,cicilan_uang:0,tnr_dibayar_uang:0,sisten_uang:0,
          pelunasan_uang:0,pinj_toko:0,pokok_barang:0,jasa_barang:0,tenor_barang:0,cicilan_barang:0,
          tnr_dibayar_bar:0,sisten_barang:0,pelunasan_bar:0,jlh_potongan:0,
          T_pokok:0,T_wajib:0,T_sukarela:0,T_thr:0,T_qurban:0,T_harkop:0
        };
      }
    } catch(e){
      currentMember={
        no_reg:noreg, nama:'(Gagal terhubung ke server)', unit:'—',
        sim_pokok:0,sim_wajib:0,sim_sukarela:0,sim_thr:0,sim_qurban:0,sim_dansos:0,sim_harkop:0,
        jlh_simpanan:0,pokok_uang:0,jasa_uang:0,tenor_uang:0,cicilan_uang:0,tnr_dibayar_uang:0,sisten_uang:0,
        pelunasan_uang:0,pinj_toko:0,pokok_barang:0,jasa_barang:0,tenor_barang:0,cicilan_barang:0,
        tnr_dibayar_bar:0,sisten_barang:0,pelunasan_bar:0,jlh_potongan:0,
        T_pokok:0,T_wajib:0,T_sukarela:0,T_thr:0,T_qurban:0,T_harkop:0
      };
    }
    renderSlip(currentMember);
    btn.disabled=false; setLoading(false);
    return;
  }

  btn.disabled=true; setLoading(true);
  try{
    const res  = await fetch(SCRIPT_URL+'?action=login&noreg='+encodeURIComponent(noreg)+'&pass='+encodeURIComponent(pass));
    const data = await res.json();
    if(data.status==='ok'&&data.member){
      resetLoginAttempts();
      currentMember=data.member;
      renderSlip(currentMember);
    } else {
      const attempts=recordFailedAttempt();
      const sisa=MAX_ATTEMPTS-attempts;
      if(sisa>0) err.textContent=`${data.message||'No. Registrasi atau Password salah.'} Sisa percobaan: ${sisa}.`;
      else err.textContent=`⚠️ Akun terblokir sementara. Coba lagi setelah ${LOCKOUT_MINUTES} menit.`;
      err.classList.add('show');
      updateLockoutUI();
    }
  } catch(e){
    err.textContent='Gagal terhubung ke server. Cek koneksi internet Anda.';
    err.classList.add('show');
  }
  btn.disabled=false; setLoading(false);
  updateLockoutUI();
}

// ======================= RENDER SLIP =======================
function renderSlip(m){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('slip-wrap').style.display='block';
  document.getElementById('s-noreg').textContent=m.no_reg||'-';
  document.getElementById('s-unit').textContent =m.unit||'-';
  document.getElementById('s-nama').textContent =m.nama||'-';

  const pelSP=parseN(m.pelunasan_uang), pelPU=parseN(m.pelunasan_bar);
  document.getElementById('label-pelunasan-sp').innerText=rp(pelSP);
  document.getElementById('label-pelunasan-pu').innerText=rp(pelPU);
  document.getElementById('cb-pelunasan-sp').setAttribute('data-nilai',pelSP);
  document.getElementById('cb-pelunasan-pu').setAttribute('data-nilai',pelPU);

  const simPokok=parseN(m.sim_pokok), simWajib=parseN(m.sim_wajib), simSukarela=parseN(m.sim_sukarela);
  const simThr=parseN(m.sim_thr), simQurban=parseN(m.sim_qurban), simDansos=parseN(m.sim_dansos), simHarkop=parseN(m.sim_harkop);
  const jlhSim=parseN(m.jlh_simpanan);
  const pokokUang=parseN(m.pokok_uang), jasaUang=parseN(m.jasa_uang), tenorUang=parseN(m.tenor_uang);
  const cicilanUang=parseN(m.cicilan_uang), tnrDibayarU=parseN(m.tnr_dibayar_uang), sistenU=parseN(m.sisten_uang);
  const pelunasanU=parseN(m.pelunasan_uang);
  const pinjToko=parseN(m.pinj_toko), pokokBar=parseN(m.pokok_barang), jasaBar=parseN(m.jasa_barang);
  const tenorBar=parseN(m.tenor_barang), cicilanBar=parseN(m.cicilan_barang);
  const tnrDibayarB=parseN(m.tnr_dibayar_bar), sistenB=parseN(m.sisten_barang), pelunasanB=parseN(m.pelunasan_bar);
  const jlhPotongan=parseN(m.jlh_potongan);
  const Tpokok=parseN(m.T_pokok), Twajib=parseN(m.T_wajib), Tsukarela=parseN(m.T_sukarela);
  const Tthr=parseN(m.T_thr), Tqurban=parseN(m.T_qurban), Tharkop=parseN(m.T_harkop);
  const totalSim=Tpokok+Twajib+Tsukarela+Tthr+Tqurban+Tharkop;

  const dRow=(lbl,val)=>`<div class="d-row"><span class="d-lbl">${lbl}</span><div class="d-right"><span class="d-rp">Rp</span><span class="d-val ${!val?'zero':''}">${val?rp(val):'-'}</span></div></div>`;
  const tsRow=(lbl,val)=>`<div class="ts-row"><span class="ts-lbl">${lbl}</span><div class="ts-right"><span class="ts-rp">Rp</span><span class="ts-val ${!val?'zero':''}">${val?rp(val):'-'}</span></div></div>`;

  let html='';
  html+=`<div class="req-section"><div class="req-row"><span class="req-lbl">Permintaan Potongan KKAW</span><span class="req-val">Rp ${rp(jlhPotongan)}</span></div></div>`;
  html+=`<div class="sec-hd"><span class="sec-lbl">A. Jumlah Potongan Tabungan</span><span class="sec-val ${!jlhSim?'zero':''}">Rp ${jlhSim?rp(jlhSim):'-'}</span></div>`;
  html+=dRow('Simp. Pokok',simPokok)+dRow('Simp. Wajib',simWajib)+dRow('Simp. Sukarela',simSukarela)+dRow('Simpanan THR',simThr)+dRow('Simpanan Qurban',simQurban)+dRow('Dansos',simDansos)+dRow('Simpanan Harkop',simHarkop);
  html+=`<div class="sec-hd"><span class="sec-lbl">B. Jumlah Potongan Pinjaman Uang</span><span class="sec-val ${!cicilanUang?'zero':''}">Rp ${cicilanUang?rp(cicilanUang):'-'}</span></div>`;
  html+=dRow('Pokok',pokokUang)+dRow('Jasa',jasaUang);
  html+=`<div class="tenor-row"><div class="t-cell"><div class="t-lbl">Tenor</div><span class="t-num">${tenorUang||'-'}</span></div><div class="t-cell"><div class="t-lbl">Sudah Dibayar</div><span class="t-num">${tnrDibayarU||'-'}</span></div><div class="t-cell"><div class="t-lbl">Sisa Tenor</div><span class="t-num red">${sistenU||'-'}</span></div></div>`;
  html+=`<div class="sec-hd"><span class="sec-lbl">C. Jumlah Potongan Pinjaman Barang</span><span class="sec-val ${!cicilanBar?'zero':''}">Rp ${cicilanBar?rp(cicilanBar):'-'}</span></div>`;
  html+=dRow('Pokok',pokokBar)+dRow('Jasa',jasaBar)+dRow('Belanja Toko',pinjToko);
  html+=`<div class="tenor-row"><div class="t-cell"><div class="t-lbl">Tenor</div><span class="t-num">${tenorBar||'-'}</span></div><div class="t-cell"><div class="t-lbl">Sudah Dibayar</div><span class="t-num">${tnrDibayarB||'-'}</span></div><div class="t-cell"><div class="t-lbl">Sisa Tenor</div><span class="t-num red">${sistenB||'-'}</span></div></div>`;
  if(pelunasanU>0) html+=`<div class="pel-row"><span class="pel-lbl">Pelunasan Uang (Pokok + <span style="color:#f57c00">25% Jasa</span>)</span><span class="pel-val">Rp ${rp(pelunasanU)}</span></div>`;
  if(pelunasanB>0) html+=`<div class="pel-row"><span class="pel-lbl">Pelunasan Barang (Pokok + <span style="color:#f57c00">25% Jasa</span>)</span><span class="pel-val">Rp ${rp(pelunasanB)}</span></div>`;
  html+=`<div class="totsim-hd"><div class="totsim-hd-lbl">Total Simpanan</div></div>`;
  html+=tsRow('Total Simpanan Pokok',Tpokok)+tsRow('Total Simpanan Wajib',Twajib)+tsRow('Total Simpanan Sukarela',Tsukarela)+tsRow('Total Simpanan THR (IDUL FITRI)',Tthr)+tsRow('Total Simpanan Qurban (IDUL ADHA)',Tqurban)+tsRow('Total Simpanan Hari Koperasi',Tharkop);
  html+=`<div class="grand"><span class="grand-lbl">Total Simpanan</span><div class="grand-right"><span class="grand-rp">Rp</span><span class="grand-val">${rp(totalSim)}</span></div></div>`;
  html+=`<div class="slip-foot"><div class="slip-foot-txt">Diterbitkan otomatis oleh sistem KKAW BPI periode · ${periodeSlip}</div></div>`;
  document.getElementById('slip-body').innerHTML=html;
  document.getElementById('simulasi-panel').classList.remove('show');
}

// ======================= GET TARIF PREMI (FIXED) =======================
async function getTarifPremiFromSheet(usia, tahunTenor) {
  const url = `${SCRIPT_URL}?action=getPremi&usia=${usia}&tahun=${tahunTenor}`;
  const response = await fetch(url);
  if (!response.ok) throw new Error('HTTP error: ' + response.status);
  const data = await response.json();

  // FIX: cek status === 'ok' saja, JANGAN pakai if(data.tarif) karena tarif 0 akan dianggap false
  if (data.status === 'ok' && data.tarif !== undefined && data.tarif !== null) {
    return parseFloat(data.tarif);
  }

  // Kalau error, lempar exception agar kelihatan di console
  throw new Error(data.message || 'Tarif tidak ditemukan');
}

// ======================= HITUNG SIMULASI =======================
async function hitungSimulasi() {
  const jenis      = document.querySelector('input[name="jenis"]:checked').value;
  const tahunLahir = parseInt(document.getElementById('tahun-lahir').value);
  const pengajuan  = parseFloat(document.getElementById('pengajuan').value);
  const tenor      = parseFloat(document.getElementById('tenor').value);
  const cbSP       = document.getElementById('cb-pelunasan-sp');
  const cbPU       = document.getElementById('cb-pelunasan-pu');
  const pelunasanSP = cbSP.checked ? parseFloat(cbSP.getAttribute('data-nilai')||0) : 0;
  const pelunasanPU = cbPU.checked ? parseFloat(cbPU.getAttribute('data-nilai')||0) : 0;

  if(isNaN(pengajuan)||pengajuan<=0){ alert("Masukkan pengajuan pinjaman yang valid"); return; }
  if(isNaN(tenor)||tenor<=0)        { alert("Masukkan tenor yang valid"); return; }
  if(isNaN(tahunLahir)||tahunLahir<1900){ alert("Masukkan tahun lahir yang valid (contoh: 1985)"); return; }

  const btnHitung   = document.getElementById('btn-hitung-simulasi');
  const simLoading  = document.getElementById('sim-loading');
  const hasilDiv    = document.getElementById('hasil-simulasi');

  // Tampilkan loading, sembunyikan hasil lama
  btnHitung.disabled = true;
  btnHitung.textContent = 'Menghitung...';
  simLoading.classList.add('show');
  hasilDiv.style.display = 'none';

  const kenaPremi = pengajuan > 10000000;
  let usia=0, tahunTenor=0, tarifPremi=0, premiAsuransi=0, pembayaranPremi=0;
  let errPremiMsg = '';

  if(kenaPremi){
    usia       = new Date().getFullYear() - tahunLahir;
    tahunTenor = Math.ceil(tenor / 12);
    try {
      tarifPremi = await getTarifPremiFromSheet(usia, tahunTenor);
    } catch(e) {
      console.error('Gagal ambil premi:', e.message);
      errPremiMsg = e.message;
      tarifPremi  = 8.0; // fallback
    }
    premiAsuransi    = pengajuan / 1000;
    pembayaranPremi  = premiAsuransi * tarifPremi;
  }

  const uangDiterima       = pengajuan - pelunasanSP - pelunasanPU - pembayaranPremi;
  const jasaRate           = (jenis==='uang') ? 0.5 : 1.0;
  const pokokPerBulan      = Math.round(pengajuan / tenor);
  const jasaPerBulan       = Math.round(pengajuan * (jasaRate / 100));
  const jumlahPembayaran   = pokokPerBulan + jasaPerBulan;

  let detailPremi = '';
  if(kenaPremi){
    const warningErr = errPremiMsg
      ? `<div class="hasil-row"><span class="hasil-lbl" style="color:#c62828">⚠️ Tarif dari server gagal (${errPremiMsg}), digunakan default 8.0</span></div>`
      : '';
    detailPremi = `
      <div class="bg-kuning" style="margin-bottom:12px;">
        ${warningErr}
        <div class="hasil-row"><span class="hasil-lbl">Usia:</span><span class="hasil-val">${usia} tahun</span></div>
        <div class="hasil-row"><span class="hasil-lbl">Tenor (pembulatan tahun):</span><span class="hasil-val">${tahunTenor} tahun</span></div>
        <div class="hasil-row"><span class="hasil-lbl">Tarif Premi (dari tabel):</span><span class="hasil-val">${tarifPremi}</span></div>
        <div class="hasil-row"><span class="hasil-lbl">Premi Asuransi (pengajuan ÷ 1000):</span><span class="hasil-val">Rp ${rp(premiAsuransi)}</span></div>
        <div class="hasil-row"><span class="hasil-lbl">Pembayaran Premi:</span><span class="hasil-val">Rp ${rp(pembayaranPremi)}</span></div>
      </div>`;
  } else {
    detailPremi = `
      <div class="bg-kuning" style="margin-bottom:12px;">
        <div class="hasil-row"><span class="hasil-lbl">Premi Asuransi:</span><span class="hasil-val">Tidak dikenakan (pinjaman ≤ Rp 10.000.000)</span></div>
      </div>`;
  }

  hasilDiv.innerHTML = `
    ${detailPremi}
    <div class="hasil-row"><span class="hasil-lbl">Pelunasan SP:</span><span class="hasil-val txt-merah">Rp ${rp(pelunasanSP)}</span></div>
    <div class="hasil-row"><span class="hasil-lbl">Pelunasan PU:</span><span class="hasil-val txt-merah">Rp ${rp(pelunasanPU)}</span></div>
    ${kenaPremi?`<div class="hasil-row"><span class="hasil-lbl">Pembayaran Premi:</span><span class="hasil-val txt-merah">Rp ${rp(pembayaranPremi)}</span></div>`:''}
    <div class="hasil-row"><span class="hasil-lbl">Uang yang diterima:</span><span class="hasil-val txt-hijau besar">Rp ${rp(uangDiterima)}</span></div>
    <div style="margin-top:16px;border-top:1px dashed #ccc;padding-top:12px;">
      <div class="hasil-row"><span class="hasil-lbl">Pokok per bulan:</span><span class="hasil-val">Rp ${rp(pokokPerBulan)}</span></div>
      <div class="hasil-row"><span class="hasil-lbl">Jasa per bulan (${jasaRate}%):</span><span class="hasil-val">Rp ${rp(jasaPerBulan)}</span></div>
      <div class="highlight-biru">
        <div class="hasil-row"><span class="hasil-lbl">⭐ Jumlah Pembayaran per bulan:</span><span class="hasil-val besar">Rp ${rp(jumlahPembayaran)}</span></div>
      </div>
    </div>`;

  hasilDiv.style.display = 'block';
  simLoading.classList.remove('show');
  btnHitung.disabled = false;
  btnHitung.textContent = 'Hitung Simulasi';

  // Scroll ke hasil
  setTimeout(()=>hasilDiv.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

// ======================= TOGGLE SIMULASI =======================
function toggleSimulasiPanel(){
  const panel=document.getElementById('simulasi-panel');
  const isHidden=!panel.classList.contains('show');
  panel.classList.toggle('show');
  if(isHidden) setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

// ======================= DOWNLOAD JPG =======================
async function downloadSlipJPG(){
  const btn=document.getElementById('btn-download');
  const orig=btn.textContent;
  btn.textContent='📸 Memproses...'; btn.disabled=true;
  const card=document.querySelector('.slip-card');
  const topbar=document.querySelector('.slip-topbar');
  const origDisplay=topbar?topbar.style.display:'';
  if(topbar) topbar.style.display='none';
  try{
    const canvas=await html2canvas(card,{scale:2,backgroundColor:'#ffffff',logging:false,useCORS:true});
    const nama=document.getElementById('s-nama').textContent.trim().replace(/\s+/g,'_');
    const per=periodeSlip.replace(/ /g,'_').replace(/\./g,'');
    const link=document.createElement('a');
    link.download=`slipkkaw_${nama}_${per}.jpg`;
    link.href=canvas.toDataURL('image/jpeg',0.95);
    link.click();
  } catch(e){ alert('Gagal mendownload slip.'); }
  if(topbar) topbar.style.display=origDisplay;
  btn.textContent=orig; btn.disabled=false;
}

// ======================= LOGOUT =======================
function doLogout(){
  document.getElementById('slip-wrap').style.display='none';
  document.getElementById('login-wrap').style.display='block';
  document.getElementById('inp-noreg').value='';
  document.getElementById('inp-pass').value='';
  document.getElementById('err-box').classList.remove('show');
  document.getElementById('simulasi-panel').classList.remove('show');
  document.getElementById('hasil-simulasi').style.display='none';
  currentMember=null;
  updateLockoutUI();
}

// ======================= INIT =======================
document.getElementById('btn-toggle-simulasi').addEventListener('click', toggleSimulasiPanel);
document.getElementById('btn-hitung-simulasi').addEventListener('click', hitungSimulasi);
updateLockoutUI();
setInterval(()=>{ if(isLockedOut()) updateLockoutUI(); }, 1000);
</script>
